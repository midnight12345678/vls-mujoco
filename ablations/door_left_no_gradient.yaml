device: &device 'cuda'
seed: &seed 0

main:
  episode_num: 10
  seed: *seed
  output_dir: "results/ablation_no_gradient/"
  cached_functions_dir: null
  visualize_trajectory: true
  debug_draw_trajectory: true
  render: &render false
  max_episode_steps: &max_episode_steps 200
  use_guidance: true
  action_horizon: &action_horizon 14
  instruction: "move the door to the left"
  sample_batch_size: 10
  guide_scale: 0.0
  diversity_scale: 10.0
  start_step: &start_step 70
  MCMC_steps: &MCMC_steps 4
  guidance_cutoff_ratio: 0.6
  use_fkd: true
  fkd:
    potential_type: "max"
    lmbda: 10.0
    adaptive_resampling: true
    resample_frequency: 5

env:
  backend: &backend "calvin"
  maniskill:
    id: "PickPlace1Cube-v1"
    obs_mode: "rgb+depth+segmentation"
    control_mode: "pd_ee_delta_pose"
    reward_mode: "sparse"
    max_episode_steps: *max_episode_steps
    vlm_camera: "base_camera"
    render_human: *render
    vlm-camera: "base_camera"

  calvin:
    id: "PlayTableSimEnv"
    type: 2
    seed: *seed
    use_vr: false
    bullet_time_step: 240
    show_gui: *render
    use_egl: true
    control_freq: 30
    use_scene_info: false
    vlm_camera: "static"
    cubes_table_only: true
    max_episode_steps: *max_episode_steps
    target_behavior: "door_left"

    robot_cfg:
      _target_: calvin_env.robot.robot.Robot
      filename: "franka_panda/panda_longer_finger.urdf"
      base_position: [-0.34, -0.46, 0.24]
      base_orientation: [0, 0, 0]
      initial_joint_positions: [-1.21779206, 1.03987646, 2.11978261, -2.34205014, -0.87015947, 1.64119353, 0.55344866]
      max_joint_force: 200.0
      gripper_force: 200
      arm_joint_ids: [0, 1, 2, 3, 4, 5, 6]
      gripper_joint_ids: [9, 11]
      gripper_joint_limits: [0, 0.04]
      tcp_link_id: 15
      end_effector_link_id: 7
      gripper_cam_link: 12
      use_nullspace: true
      max_velocity: 2
      use_ik_fast: false
      magic_scaling_factor_pos: 1
      magic_scaling_factor_orn: 1
      use_target_pose: true
      euler_obs: true

    cameras:
      static:
        _target_: calvin_env.camera.static_camera.StaticCamera
        name: "static"
        fov: 10
        aspect: 1
        nearval: 0.01
        farval: 10
        width: 200
        height: 200
        look_at: [-0.026242351159453392, -0.0302329882979393, 0.3920000493526459]
        look_from: [2.871459009488717, -2.166602199425597, 2.555159848480571]
        up_vector: [0.4041403970338857, 0.22629790978217404, 0.8862616969685161]
      gripper:
        _target_: calvin_env.camera.gripper_camera.GripperCamera
        name: "gripper"
        fov: 75
        aspect: 1
        nearval: 0.01
        farval: 2
        width: 84
        height: 84

    scene_cfg:
      _target_: calvin_env.scene.play_table_scene.PlayTableScene
      _recursive_: false
      data_path: "data"
      global_scaling: 0.8
      euler_obs: true
      robot_base_position: [-0.34, -0.46, 0.24]
      robot_base_orientation: [0, 0, 0]
      robot_initial_joint_positions: [-1.21779206, 1.03987646, 2.11978261, -2.34205014, -0.87015947, 1.64119353, 0.55344866]
      name: "calvin_scene_D"
      surfaces:
        table: [[0.0, -0.15, 0.46], [0.35, -0.03, 0.46]]
        slider_left: [[-0.32, 0.05, 0.46], [-0.16, 0.12, 0.46]]
        slider_right: [[-0.05, 0.05, 0.46], [0.13, 0.12, 0.46]]
      objects:
        fixed_objects:
          table:
            file: "calvin_table_D/urdf/calvin_table_D.urdf"
            initial_pos: [0, 0, 0]
            initial_orn: [0, 0, 0]
            joints:
              base__slide: {initial_state: 0.0}  # Door on right, slide left
              base__drawer: {initial_state: 0.15}
            buttons:
              base__button: {initial_state: 0, effect: "led"}
            switches:
              base__switch: {initial_state: 0.08, effect: "lightbulb"}
            lights:
              lightbulb: {link: "light_link", color: [1, 1, 0, 1]}
              led: {link: "led_link", color: [0, 1, 0, 1]}
        movable_objects:
          block_red: {file: "blocks/block_red_middle.urdf", initial_pos: "any", initial_orn: "any"}
          block_blue: {file: "blocks/block_blue_small.urdf", initial_pos: "any", initial_orn: "any"}
          block_pink: {file: "blocks/block_pink_big.urdf", initial_pos: "any", initial_orn: "any"}

policy:
  pretrained_path: "Vision-Language-Steering/vls_calvin_base"

keypoint_detector:
  num_candidates_per_mask: 2
  min_dist_bt_keypoints: 0.05
  max_mask_ratio: 0.5
  device: *device
  bounds_min: [-1.0, -0.75, -0.1]
  bounds_max: [0.10, 0.75, 1.2]
  seed: *seed
  feature_extractor: "dinov3_vitb16"

sam3:
  enabled: false

gemini_grounding:
  enabled: true
  api_key: null  # Set GOOGLE_API_KEY env var
  model: "gemini-3-flash-preview"
  default_objects: ["drawer handle", "drawer interior", "sliding handle", "slider handle", "black switch", "red cube", "blue cube", "pink cube"]

vlm_agent:
  base_url: null  # Set AZURE_OPENAI_BASE_URL env var
  model: "gpt-5.2-chat"
  api_key: null  # Set AZURE_OPENAI_API_KEY env var
  temperature: 1.0
  max_completion_tokens: 2000
  query_template_dir: "vlm_query/"
